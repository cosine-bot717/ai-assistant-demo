<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建 AI 助理 - 小鹅通</title>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #40a9ff;
            --primary-light: #e6f7ff;
            --bg: #f0f2f5;
            --card: #ffffff;
            --border: #d9d9d9;
            --border-light: #f0f0f0;
            --text-1: #262626;
            --text-2: #595959;
            --text-3: #8c8c8c;
            --text-4: #bfbfbf;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 6px 16px rgba(0, 0, 0, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-1);
            line-height: 1.5715;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 14px;
            color: var(--text-3);
        }

        /* Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        /* Card */
        .card {
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.24s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary);
        }

        .card-icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon svg {
            width: 24px;
            height: 24px;
        }

        .card-icon.shopping { background: #fff1f0; color: #f5222d; }
        .card-icon.edu { background: #f6ffed; color: #52c41a; }
        .card-icon.live { background: #f9f0ff; color: #722ed1; }
        .card-icon.custom { background: #e6f7ff; color: var(--primary); }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 4px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-3);
            margin-bottom: 16px;
        }

        .card-tags {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tag {
            font-size: 12px;
            padding: 4px 8px;
            background: #fafafa;
            color: var(--text-2);
            border-radius: 4px;
            text-align: center;
        }

        /* Drawer Overlay */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .drawer-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* Drawer */
        .drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: var(--card);
            z-index: 1001;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 12px rgba(0, 0, 0, 0.15);
        }

        .drawer.active {
            right: 0;
        }

        /* Drawer Header */
        .drawer-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .drawer-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drawer-icon svg {
            width: 24px;
            height: 24px;
        }

        .drawer-icon.shopping { background: #fff1f0; color: #f5222d; }
        .drawer-icon.edu { background: #f6ffed; color: #52c41a; }
        .drawer-icon.live { background: #f9f0ff; color: #722ed1; }
        .drawer-icon.custom { background: #e6f7ff; color: var(--primary); }

        .drawer-info {
            flex: 1;
        }

        .drawer-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-1);
        }

        .drawer-subtitle {
            font-size: 13px;
            color: var(--text-3);
            margin-top: 2px;
        }

        .drawer-close {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .drawer-close:hover {
            background: #f5f5f5;
            color: var(--text-1);
        }

        /* Drawer Body */
        .drawer-body {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .section {
            margin-bottom: 28px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 16px;
            padding-left: 10px;
            border-left: 3px solid var(--primary);
        }

        /* Ability List */
        .ability-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ability-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #fafafa;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .ability-item:hover {
            background: #f5f5f5;
        }

        .ability-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: var(--primary-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .ability-icon svg {
            width: 16px;
            height: 16px;
            color: var(--primary);
        }

        .ability-content {
            flex: 1;
        }

        .ability-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-1);
            margin-bottom: 2px;
        }

        .ability-desc {
            font-size: 12px;
            color: var(--text-3);
        }

        /* Chat Demo */
        .chat-demo {
            background: #fafafa;
            border-radius: 8px;
            padding: 16px;
        }

        .chat-message {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .chat-message:last-child {
            margin-bottom: 0;
        }

        .chat-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 11px;
            font-weight: 600;
        }

        .chat-avatar.visitor {
            background: #bfbfbf;
            color: #fff;
        }

        .chat-avatar.ai {
            background: var(--primary);
            color: #fff;
        }

        .chat-bubble {
            max-width: 260px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            background: var(--card);
            border: 1px solid var(--border-light);
        }

        .chat-message.ai .chat-bubble {
            background: var(--primary-light);
            border-color: transparent;
        }

        .chat-highlight {
            color: var(--primary);
            font-weight: 500;
        }

        /* Training Tip */
        .training-tip {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 6px;
            padding: 14px 16px;
        }

        .training-tip-text {
            font-size: 13px;
            color: #ad8b00;
            line-height: 1.6;
        }

        .training-tip-text strong {
            color: #874d00;
        }

        /* Drawer Footer */
        .drawer-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-light);
            background: var(--card);
        }

        .btn-primary {
            width: 100%;
            height: 40px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-primary:active {
            background: #096dd9;
        }

        /* Responsive */
        @media (max-width: 800px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 540px) {
            .card-grid {
                grid-template-columns: 1fr;
            }

            .drawer {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>

        function openDrawer(key) {
            const role = roles[key];

            // 更新抽屉头部
            const iconEl = document.getElementById('drawerIcon');
            iconEl.innerHTML = role.icon;
            iconEl.className = 'drawer-icon ' + role.iconClass;

            document.getElementById('drawerTitle').textContent = role.title;
            document.getElementById('drawerSubtitle').textContent = role.subtitle;

            // 更新能力列表
            document.getElementById('abilityList').innerHTML = role.abilities.map(a => `
                <div class="ability-item">
                    <div class="ability-icon">${a.icon}</div>
                    <div class="ability-content">
                        <div class="ability-name">${a.name}</div>
                        <div class="ability-desc">${a.desc}</div>
                    </div>
                </div>
            `).join('');

            // 更新对话模拟
            document.getElementById('chatDemo').innerHTML = `
                <div class="chat-message visitor">
                    <div class="chat-avatar visitor">客</div>
                    <div class="chat-bubble">${role.chat.visitor}</div>
                </div>
                <div class="chat-message ai">
                    <div class="chat-avatar ai">AI</div>
                    <div class="chat-bubble">${role.chat.ai}</div>
                </div>
            `;

            // 更新培训提示
            document.getElementById('trainingTip').innerHTML = `<div class="training-tip-text">${role.training}</div>`;

            // 显示抽屉
            document.querySelector('.drawer-overlay').classList.add('active');
            document.querySelector('.drawer').classList.add('active');
        }

        function closeDrawer() {
            document.querySelector('.drawer-overlay').classList.remove('active');
            document.querySelector('.drawer').classList.remove('active');
        }

        function hire() {
            closeDrawer();
            setTimeout(() => {
                window.location.href = 'ai-assistant-config.html';
            }, 300);
        }

        // ESC 键关闭抽屉
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeDrawer();
        });
    </script>
</body>
</html>
