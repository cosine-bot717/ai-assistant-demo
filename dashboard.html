<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 经营中枢 - 小鹅通</title>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #40a9ff;
            --primary-active: #096dd9;
            --primary-light: #e6f7ff;
            --success: #52c41a;
            --success-light: #f6ffed;
            --warning: #faad14;
            --warning-light: #fffbe6;
            --error: #ff4d4f;
            --bg: #f0f2f5;
            --card: #ffffff;
            --border: #d9d9d9;
            --border-light: #f0f0f0;
            --text-1: #262626;
            --text-2: #595959;
            --text-3: #8c8c8c;
            --text-4: #bfbfbf;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-1);
            line-height: 1.5715;
        }

        /* Header */
        .header {
            height: 56px;
            background: var(--card);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, var(--primary) 0%, #2f54eb 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 16px;
            height: 16px;
            color: #fff;
        }

        .logo-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-1);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-time {
            font-size: 13px;
            color: var(--text-3);
        }

        .btn {
            height: 32px;
            padding: 0 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            border: none;
        }

        .btn svg {
            width: 14px;
            height: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-default {
            background: var(--card);
            color: var(--text-1);
            border: 1px solid var(--border);
        }

        .btn-default:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Page Title */
        .page-title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: 24px;
        }

        /* Section */
        .section {
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .section-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title-icon {
            width: 20px;
            height: 20px;
            color: var(--primary);
        }

        .section-body {
            padding: 24px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .stat-card {
            background: #fafafa;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.2s;
        }

        .stat-card:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 8px rgba(24, 144, 255, 0.1);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon svg {
            width: 20px;
            height: 20px;
        }

        .stat-icon.blue {
            background: var(--primary-light);
            color: var(--primary);
        }

        .stat-icon.green {
            background: var(--success-light);
            color: var(--success);
        }

        .stat-icon.orange {
            background: var(--warning-light);
            color: var(--warning);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-3);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-1);
            line-height: 1.2;
        }

        .stat-unit {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-2);
            margin-left: 2px;
        }

        .stat-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            font-size: 12px;
        }

        .stat-trend.up {
            color: var(--success);
        }

        .stat-trend svg {
            width: 12px;
            height: 12px;
        }

        /* Employee List */
        .employee-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .employee-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #fafafa;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .employee-item:hover {
            border-color: var(--primary);
            background: #fff;
        }

        .employee-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .employee-status.active {
            background: var(--success);
            box-shadow: 0 0 0 2px rgba(82, 196, 26, 0.2);
        }

        .employee-status.inactive {
            background: var(--text-4);
        }

        .employee-info {
            flex: 1;
        }

        .employee-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-1);
        }

        .employee-role {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 2px;
        }

        .employee-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .employee-badge.active {
            background: var(--success-light);
            color: var(--success);
        }

        .employee-badge.inactive {
            background: #f5f5f5;
            color: var(--text-3);
        }

        /* Small Button */
        .btn-sm {
            height: 28px;
            padding: 0 12px;
            font-size: 13px;
        }

        .btn-sm svg {
            width: 12px;
            height: 12px;
        }

        /* Brain Section */
        .brain-status {
            width: 100%;
        }

        .brain-progress {
            margin-bottom: 16px;
        }

        .brain-progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .brain-progress-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-1);
        }

        .brain-progress-value {
            font-size: 13px;
            color: var(--text-2);
        }

        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, #2f54eb 100%);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .brain-status-text {
            font-size: 13px;
            color: var(--text-2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .brain-status-text svg {
            width: 14px;
            height: 14px;
            color: var(--success);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .section-header .btn-sm {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                </div>
                <span class="logo-text">AI 经营中枢</span>
            </div>
        </div>
        <div class="header-right">
            <span class="header-time">2026-04-01 星期二</span>
        </div>
    </header>

    <!-- Container -->
    <div class="container">
        <h1 class="page-title">工作台</h1>

        <!-- 昨日 AI 经营数据 -->
        <div class="section">
            <div class="section-header">
                <span class="section-title">
                    <svg class="section-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>

                    昨日 AI 经营数据
                </span>
            </div>
            <div class="section-body">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <div class="stat-icon blue">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                    <circle cx="9" cy="7" r="4"/>
                                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>

                                </svg>
                            </div>
                            <span class="stat-label">累计接待人次</span>
                        </div>
                        <div class="stat-value">3,402<span class="stat-unit">次</span></div>
                        <div class="stat-trend up">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                                <polyline points="17 6 23 6 23 12"/>
                            </svg>

                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <div class="stat-icon green">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="1" x2="12" y2="23"/>

                                </svg>
                            </div>
                            <span class="stat-label">主动挽单/发券 GMV</span>
                        </div>
                        <div class="stat-value">¥12,500</div>
                        <div class="stat-trend up">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                                <polyline points="17 6 23 6 23 12"/>
                            </svg>
                            较前日 +8.3%
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card-header">
                            <div class="stat-icon orange">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                                </svg>
                            </div>
                            <span class="stat-label">客诉拦截率</span>
                        </div>
                        <div class="stat-value">87<span class="stat-unit">%</span></div>
                        <div class="stat-trend up">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                                <polyline points="17 6 23 6 23 12"/>
                            </svg>
                            较前日 +3.2%
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- AI 数字员工管理 -->
        <div class="section">
            <div class="section-header">
                <span class="section-title">
                    <svg class="section-title-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>

                </span>
                <button class="btn btn-primary btn-sm" onclick="goToMarket()">

                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    前往招聘市场
                </button>
            </div>
            <div class="section-body">
                <div class="employee-list">
                    <div class="employee-item">
                        <div class="employee-status active"></div>
                        <div class="employee-info">
                            <div class="employee-name">金牌导购</div>
                            <div class="employee-role">店铺客服 · 已服役 15 天</div>

                        <span class="employee-badge active">运行中</span>
                    </div>
                    <div class="employee-item">
                        <div class="employee-status active"></div>
                        <div class="employee-info">
                            <div class="employee-name">专属助教</div>
                            <div class="employee-role">班级群答疑 · 已服役 8 天</div>
                        </div>

                    </div>
                    <div class="employee-item">
                        <div class="employee-status inactive"></div>
                        <div class="employee-info">
                            <div class="employee-name">直播场控</div>
                            <div class="employee-role">直播间 · 未配置</div>
                        </div>
                        <span class="employee-badge inactive">未激活</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 企业业务大脑 -->

            <div class="section-header">

                <button class="btn btn-default btn-sm" onclick="goToKnowledgeBase()">

                    管理数据
                </button>
            </div>
            <div class="section-body">
                <div class="brain-status">
                    <div class="brain-progress">
                        <div class="brain-progress-header">
                            <span class="brain-progress-label">数据健康度</span>
                            <span class="brain-progress-value">128 份 / 优秀</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: 85%"></div>
                        </div>
                    </div>
                    <div class="brain-status-text">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>

                        已同步 128 份小鹅通生态数据，SCRM 热数据实时互通中

                </div>
            </div>
        </div>
    </div>

    <script>
        // 前往招聘市场
        function goToMarket() {
            window.location.href = 'new-ai-assistant.html';
        }

        // 前往智库管理
        function goToKnowledgeBase() {
            window.location.href = 'ai-knowledge-base.html';
        }
    </script>
</body>
</html>
