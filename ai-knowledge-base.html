<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智库管理 - 小鹅通</title>
    <style>
        :root {
            --primary: #1890ff;
            --primary-hover: #40a9ff;
            --primary-active: #096dd9;
            --primary-light: #e6f7ff;
            --success: #52c41a;
            --success-light: #f6ffed;
            --processing: #1890ff;
            --processing-light: #e6f7ff;
            --warning: #faad14;
            --error: #ff4d4f;
            --bg: #f0f2f5;
            --card: #ffffff;
            --border: #d9d9d9;
            --border-light: #f0f0f0;
            --text-1: #262626;
            --text-2: #595959;
            --text-3: #8c8c8c;
            --text-4: #bfbfbf;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-1);
            line-height: 1.5715;
        }

        /* Header */
        .header {
            height: 56px;
            background: var(--card);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .breadcrumb-item {
            color: var(--text-3);
            cursor: pointer;
            transition: color 0.2s;
            padding: 4px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .breadcrumb-item:hover {
            color: var(--text-1);
            background: #f5f5f5;
        }

        .breadcrumb-item.active {
            color: var(--text-1);
            font-weight: 500;
            cursor: default;
        }

        .breadcrumb-item.active:hover {
            background: transparent;
        }

        .breadcrumb-sep {
            color: var(--text-4);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            height: 32px;
            padding: 0 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn svg {
            width: 14px;
            height: 14px;
        }

        .btn-default {
            background: var(--card);
            color: var(--text-1);
            border: 1px solid var(--border);
        }

        .btn-default:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            border: 1px solid var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Stats Dashboard */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon svg {
            width: 24px;
            height: 24px;
        }

        .stat-icon.blue {
            background: #e6f7ff;
            color: var(--primary);
        }

        .stat-icon.green {
            background: #f6ffed;
            color: var(--success);
        }

        .stat-icon.orange {
            background: #fff7e6;
            color: var(--warning);
        }

        .stat-content {
            flex: 1;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-3);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-1);
            line-height: 1.2;
        }

        .stat-unit {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-2);
            margin-left: 4px;
        }

        .stat-progress {
            margin-top: 8px;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
        }

        .stat-progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
        }

        .stat-hint {
            font-size: 12px;
            color: var(--text-3);
            margin-top: 4px;
        }

        /* Main Card */
        .main-card {
            background: var(--card);
            border: 1px solid var(--border-light);
            border-radius: 8px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border-light);
            padding: 0 20px;
        }

        .tab-item {
            padding: 16px 16px;
            font-size: 14px;
            color: var(--text-2);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
        }

        .tab-item:hover {
            color: var(--primary);
        }

        .tab-item.active {
            color: var(--primary);
            font-weight: 500;
            border-bottom-color: var(--primary);
        }

        .tab-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            padding: 0 6px;
            background: #f0f0f0;
            color: var(--text-2);
            font-size: 12px;
            border-radius: 9px;
            margin-left: 6px;
        }

        .tab-item.active .tab-badge {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* Table */
        .table-wrap {
            padding: 0 20px 20px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .table th {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            background: #fafafa;
        }

        .table th:first-child {
            border-radius: 8px 0 0 0;
        }

        .table th:last-child {
            border-radius: 0 8px 0 0;
        }

        .table td {
            font-size: 14px;
            color: var(--text-1);
        }

        .table tbody tr:hover {
            background: #fafafa;
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Table Elements */
        .table-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-name-icon {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .table-name-icon svg {
            width: 18px;
            height: 18px;
            color: var(--text-2);
        }

        .table-name-text {
            font-weight: 500;
        }

        .table-type {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            background: #f5f5f5;
            color: var(--text-2);
            font-size: 12px;
            border-radius: 4px;
        }

        .table-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-dot.success {
            background: var(--success);
        }

        .status-dot.processing {
            background: var(--processing);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-loading {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .loading-spinner {
            width: 12px;
            height: 12px;
            border: 2px solid var(--border-light);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .table-actions {
            display: flex;
            gap: 12px;
        }

        .action-link {
            font-size: 13px;
            color: var(--primary);
            cursor: pointer;
            transition: color 0.2s;
        }

        .action-link:hover {
            color: var(--primary-hover);
        }

        .action-link.danger {
            color: var(--text-3);
        }

        .action-link.danger:hover {
            color: var(--error);
        }

        /* Empty State */
        .empty-tip {
            margin-top: 24px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #f0f5ff 0%, #e6f7ff 100%);
            border: 1px solid #bae7ff;
            border-radius: 8px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .empty-tip-icon {
            width: 20px;
            height: 20px;
            color: var(--primary);
            flex-shrink: 0;
            margin-top: 2px;
        }

        .empty-tip-text {
            font-size: 13px;
            color: var(--text-2);
            line-height: 1.6;
        }

        .empty-tip-text strong {
            color: var(--primary);
            font-weight: 500;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            width: 520px;
            background: var(--card);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            z-index: 1001;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text-3);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #f5f5f5;
            color: var(--text-1);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .import-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .import-option {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .import-option:hover {
            border-color: var(--primary);
            background: #fafafa;
        }

        .import-option-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .import-option-icon svg {
            width: 20px;
            height: 20px;
            color: var(--text-2);
        }

        .import-option-content {
            flex: 1;
        }

        .import-option-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-1);
            margin-bottom: 2px;
        }

        .import-option-desc {
            font-size: 12px;
            color: var(--text-3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: 1fr;
            }

            .table-wrap {
                overflow-x: auto;
            }

            .table {
                min-width: 600px;
            }

            .modal {
                width: calc(100% - 32px);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="breadcrumb">
            <span class="breadcrumb-item" onclick="goBack()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <div class="header-actions">

    </header>

    <!-- Container -->

        <!-- Stats Dashboard -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    status: 'success',
                    statusText: '学习完成',
                    time: '2026-03-26'
                }
            ]
        };

        // 切换 Tab
        function switchTab(tabKey) {
            // 更新 Tab 状态
            document.querySelectorAll('.tab-item').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.tab === tabKey) {
                    tab.classList.add('active');
                }
            });

            // 渲染表格
            renderTable(tabKey);
        }

        // 渲染表格
        function renderTable(tabKey) {
            const data = tabData[tabKey];
            const tbody = document.getElementById('tableBody');

            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 48px 0; color: var(--text-3);">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin: 0 auto 12px; display: block; color: var(--text-4);">
                                <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
                                <polyline points="13 2 13 9 20 9"/>
                            </svg>
                            暂无数据，点击上方"导入新知识"开始添加
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>
                        <div class="table-name">
                            <div class="table-name-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                </svg>
                            </div>
                            <span class="table-name-text">${item.name}</span>
                        </div>
                    </td>
                    <td><span class="table-type">${item.type}</span></td>
                    <td>
                        <div class="table-status">
                            <span class="status-dot ${item.status}"></span>
                            ${item.status === 'processing' ? `
                                <span class="status-loading">
                                    <span class="loading-spinner"></span>
                                    ${item.statusText}
                                </span>
                            ` : item.statusText}
                        </div>
                    </td>
                    <td>${item.time}</td>
                    <td>
                        <div class="table-actions">
                            <span class="action-link">${item.status === 'processing' ? '停止' : '重新同步'}</span>
                            <span class="action-link danger">移除</span>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 显示容量明细
        function showCapacity() {
            alert('容量明细：\n\n已使用：45万字\n剩余配额：55万字\n配额有效期：2026-12-31');
        }

        // 显示导入弹窗
        function showImportModal() {
            document.querySelector('.modal-overlay').classList.add('active');
            document.getElementById('importModal').classList.add('active');
        }

        // 关闭导入弹窗
        function closeImportModal() {
            document.querySelector('.modal-overlay').classList.remove('active');
            document.getElementById('importModal').classList.remove('active');
        }

        // 导入来源
        function importFrom(source) {
            closeImportModal();
            const sourceNames = {
                ecology: '小鹅通生态数据',
                docs: '本地文档',
                faq: '自定义问答'
            };
            alert(`即将跳转到「${sourceNames[source]}」导入页面...`);
        }

        // 初始化
        renderTable('ecology');
    </script>
</body>
</html>
