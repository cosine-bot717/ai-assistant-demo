<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助理 Demo - 小鹅通</title>
    <style>
        :root {
            --primary: #1890ff;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text-1: #262626;
            --text-2: #595959;
            --text-3: #8c8c8c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        .logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1890ff 0%, #40a9ff 100%);
            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo svg { width: 32px; height: 32px; color: #fff; }
        h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; color: var(--text-1); }
        .subtitle { font-size: 16px; color: var(--text-3); margin-bottom: 40px; }
        .pages { display: flex; flex-direction: column; gap: 16px; }
        .page-card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px 24px;
            text-decoration: none;
            text-align: left;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .page-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }
        .page-title { font-size: 16px; font-weight: 600; color: var(--text-1); margin-bottom: 4px; }
        .page-desc { font-size: 14px; color: var(--text-3); }
        .page-arrow { float: right; color: var(--primary); font-size: 18px; }
        .footer { margin-top: 40px; font-size: 13px; color: var(--text-3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            </svg>
        </div>
        <h1>AI 助理 Demo</h1>
        <p class="subtitle">小鹅通 B端 SaaS 风格原型演示</p>

        <div class="pages">
            <a href="new-ai-assistant.html" class="page-card">
                <span class="page-arrow">→</span>
                <div class="page-title">挑选数字员工</div>
                <div class="page-desc">新建 AI 助理入口页面</div>
            </a>
            <a href="ai-assistant-config.html" class="page-card">
                <span class="page-arrow">→</span>
                <div class="page-title">岗前培训配置</div>
                <div class="page-desc">AI 助播详细配置页</div>
            </a>
            <a href="ai-knowledge-base.html" class="page-card">
                <span class="page-arrow">→</span>
                <div class="page-title">智库管理中心</div>
                <div class="page-desc">AI 知识资产管理页</div>
            </a>
        </div>

        <p class="footer">点击任意卡片开始体验完整流程</p>
    </div>
</body>
</html>
